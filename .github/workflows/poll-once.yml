name: Poll Once

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  poll-once:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: invoice-poll-once
      cancel-in-progress: false
    env:
      LOG_LEVEL: INFO
      ALLOWED_MIME_TYPES: image/jpeg,image/png,application/pdf
      REVIEW_CONFIDENCE_THRESHOLD: "0.5"
      STORE_REVIEW_SCORE_THRESHOLD: "0.6"
      NORMALIZATION_RULES_PATH: config/normalization_rules.json

      INGESTION_BACKEND: r2
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_INBOX_PREFIX: ${{ secrets.R2_INBOX_PREFIX }}
      R2_ARCHIVE_PREFIX: ${{ secrets.R2_ARCHIVE_PREFIX }}

      LEDGER_BACKEND: postgres
      POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
      POSTGRES_TABLE: ${{ secrets.POSTGRES_TABLE }}

      EXTRACTION_PROVIDER: auto
      EXTRACTION_PROVIDER_ORDER: mistral,openrouter,groq
      MISTRAL_MODEL: mistral-small-latest
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run poll-once
        run: python -m app.main poll-once

