name: Golden Set Quality Gate

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "config/**"
      - "eval/**"
      - "requirements.txt"
      - ".github/workflows/golden-eval.yml"
  pull_request:
    paths:
      - "app/**"
      - "config/**"
      - "eval/**"
      - "requirements.txt"
      - ".github/workflows/golden-eval.yml"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: golden-eval-${{ github.ref }}
      cancel-in-progress: true
    env:
      LOG_LEVEL: INFO
      NORMALIZATION_RULES_PATH: config/normalization_rules.json
      EXTRACTION_PROVIDER: auto
      EXTRACTION_PROVIDER_ORDER: mistral,openrouter,groq
      MISTRAL_MODEL: pixtral-large-latest
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          if [ -z "${MISTRAL_API_KEY}" ]; then
            echo "MISTRAL_API_KEY secret is required for golden-set evaluation."
            exit 1
          fi

      - name: Run golden-set evaluation
        run: |
          python -u -m app.evaluation \
            --dataset eval/golden_set.json \
            --provider auto \
            --model auto \
            --fail-under 0.90 \
            --output logs/golden_eval_report.json

      - name: Upload evaluation report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-eval-report
          path: logs/golden_eval_report.json
